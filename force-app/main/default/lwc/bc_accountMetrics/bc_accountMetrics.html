<template>
    <div class="container">
        <div class="title">Account Metrics for {accountName}</div>

        <div class="kpis-grid">

            <!-- Donut -->
            <div class="donut-section">
                <div class="donut-wrap">
                    <svg class="donut" viewBox="0 0 72 72">
                        <circle class="donut-bg" cx="36" cy="36" r="30"/>
                        <template if:true={hasOpportunities}>
                            <circle class="donut-arc" cx="36" cy="36" r="30"
                                stroke-dasharray={donutDash}
                                stroke-dashoffset="0"/>
                        </template>
                    </svg>
                    <div class="donut-center">{openOpportunities}</div>
                </div>
                <div class="donut-legend">
                    <div class="donut-title">Open Opportunities by Stage ({openOpportunities})</div>
                    <a class="opp-link" href={opportunitiesUrl} target="_blank">
                        <lightning-icon icon-name="utility:link" size="xx-small" variant="inverse"></lightning-icon>
                        View All Opportunities
                    </a>
                </div>
            </div>

            <!-- Revenue -->
            <div class="kpi-section">
                <div class="kpi-section-title">Revenue</div>
                <div class="kpi-row">
                    <div class="kpi-stat">
                        <div class="kpi-value">{revenueLastQuarter}</div>
                        <div class="kpi-name">Last Quarter</div>
                    </div>
                    <div class="kpi-stat">
                        <div class="kpi-value accent">{revenueThisQuarter}</div>
                        <div class="kpi-name">This Quarter</div>
                    </div>
                </div>
            </div>

            <!-- Win Rate -->
            <div class="kpi-section">
                <div class="kpi-section-title">Opportunity Win Rate</div>
                <div class="kpi-row">
                    <div class="kpi-stat">
                        <div class="kpi-value">{winRateLastQuarter}</div>
                        <div class="kpi-name">Last Quarter</div>
                    </div>
                    <div class="kpi-stat">
                        <div class="kpi-value accent">{winRateThisQuarter}</div>
                        <div class="kpi-name">This Quarter</div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</template>
